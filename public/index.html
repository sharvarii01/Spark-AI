<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark AI</title>
    <!-- Use Inter and Playfair for a modern and elegant look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <!-- Progressive Web App Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#212121">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- Landing Page Overlay -->
    <div id="landingPage" class="landing-page">
        <div class="landing-content">
            <h1 class="landing-title">Welcome to Spark AI</h1>

            <div class="landing-actions">
                <button id="startAppBtn" class="primary-btn pulse-glow">
                    Login / Sign In
                </button>
                <a href="https://github.com/sharvarii01/Spark-AI" target="_blank" rel="noopener noreferrer" class="secondary-btn" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">Explore Architecture</a>
            </div>

        </div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
                <button id="closeSidebarBtn" class="mobile-only close-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div id="userProfile" class="user-profile hidden">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-email" id="userEmail">user@example.com</div>
                </div>
                <button id="logoutBtn" class="action-btn" title="Sign Out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
            <div class="sidebar-content">
                <div class="history-title">RECENT CHATS</div>
                <ul id="historyList" class="history-list">
                    <!-- History items injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="chat-header">
                <button id="menuToggle" class="mobile-only menu-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                
                <div class="branding">
                    <img src="logo.png" alt="Spark AI Logo" class="logo">
                    <div>
                        <h2>Spark AI</h2>
                        <p>Powered by Google Gemini</p>
                    </div>
                </div>

                <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </header>

            <main class="chat-window" id="chatWindow">
                <!-- Messages injected here -->
            </main>

            <div class="input-area">
                <form id="chatForm">
                    <div class="input-wrapper">
                        <textarea 
                            id="messageInput" 
                            placeholder="Message Spark AI..." 
                            rows="1"
                            autofocus
                        ></textarea>
                        <button type="submit" id="sendBtn" title="Send message" disabled>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
                <div class="footer-text">Spark AI can make mistakes. Consider verifying important information.</div>
            </div>
        </div>
    </div>
    
    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal hidden">
        <div class="auth-box">
            <h2 id="authTitle">Sign In to Spark AI</h2>
            <p id="authSubtitle">Access your conversations anywhere.</p>
            
            <form id="authForm" class="auth-form">
                <div class="input-group">
                    <label for="emailInput">Email</label>
                    <input type="email" id="emailInput" required placeholder="you@example.com">
                </div>
                <div class="input-group">
                    <label for="passwordInput">Password</label>
                    <input type="password" id="passwordInput" required placeholder="••••••••">
                </div>
                <div id="authError" class="auth-error hidden"></div>
                <button type="submit" id="authSubmitBtn" class="primary-btn">Sign In</button>
            </form>
            
            <div class="auth-divider">
                <span>OR</span>
            </div>
            
            <button id="googleSignInBtn" class="google-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>
            
            <div class="auth-switch">
                <span id="authSwitchText">Don't have an account?</span>
                <button id="authSwitchBtn" class="text-btn">Sign Up</button>
            </div>
            <button id="skipAuthBtn" class="text-btn muted-btn">Continue Locally (No Sync)</button>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.error('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
